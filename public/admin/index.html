      <p class="admin-loading-badge">JobAdvice CMS</p>
      <h1>Admin Dashboard</h1>
      <p>Preparing your editor workspace...</p>
    </div>

    <script>
      var isLocalHost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";
      var loadingBadge = document.getElementById("admin-loading");

      function updateLoadingCopy(title, message, badgeText) {
        var loadingScreen = document.getElementById("admin-loading");
        if (!loadingScreen) {
          return;
        }

        var badgeNode = loadingScreen.querySelector(".admin-loading-badge");
        var titleNode = loadingScreen.querySelector("h1");
        var messageNode = loadingScreen.querySelector("p:last-of-type");

        if (badgeNode && badgeText) {
          badgeNode.textContent = badgeText;
        }

        if (titleNode && title) {
          titleNode.textContent = title;
        }

        if (messageNode && message) {
          messageNode.textContent = message;
        }
      }

      window.CMS_MANUAL_INIT = true;
      window.jobAdviceCmsConfig = {
        load_config_file: false,
        backend: {
          name: "github",
          repo: "hassanusmani21/Jobadvice",
          branch: "main",
          base_url: window.location.origin,
          auth_endpoint: "api/decap/auth",
        },
        local_backend: {
          url: "http://localhost:8081/api/v1",
          allowed_hosts: ["localhost", "127.0.0.1"],
        },
        logo_url: "/favicon.ico",
        media_folder: "public/uploads",
        public_folder: "/uploads",
        collections: [
          {
            name: "jobs",
            label: "Jobs",
            folder: "content/jobs",
            create: true,
            delete: true,
            extension: "md",
            format: "frontmatter",
            slug: "{{slug}}",
            identifier_field: "title",
            summary: "{{date}} | {{title}} - {{company}}",
            sortable_fields: ["date"],
            sort: "date:desc",
            fields: [
              { label: "Job Title", name: "title", widget: "string", required: true },
              {
                label: "Publish Date",
                name: "date",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: true,
                default: "{{now}}",
              },
              { label: "Company Name", name: "company", widget: "string", required: true },
              {
                label: "Location",
                name: "location",
                widget: "string",
                required: true,
                hint: "City, State, Country or Remote",
              },
              {
                label: "Work Mode",
                name: "workMode",
                widget: "string",
                required: false,
                hint: "Examples: On-site, Remote, Hybrid",
              },
              {
                label: "Employment Type",
                name: "employmentType",
                widget: "string",
                required: false,
                hint: "Examples: Full-time, Part-time, Internship, Contract",
              },
              { label: "Salary", name: "salary", widget: "string", required: false },
              {
                label: "Experience Required",
                name: "experience",
                widget: "string",
                required: false,
                hint: "Examples: Fresher, 1-3 years, 3+ years",
              },
              {
                label: "Eligibility Criteria",
                name: "eligibilityCriteria",
                widget: "text",
                required: false,
                hint: "Multiple lines supported. Put one eligibility point per line.",
              },
              {
                label: "Education",
                name: "education",
                widget: "list",
                required: false,
                hint: "Add one item per line. Example: B.Tech, MCA",
              },
              {
                label: "Skills Required",
                name: "skills",
                widget: "list",
                required: true,
                hint: "Add one skill per item. Example: Selenium, SQL, Python",
              },
              {
                label: "Roles & Responsibilities",
                name: "responsibilities",
                widget: "list",
                required: false,
                hint: "Add one responsibility per item.",
              },
              {
                label: "Working Days",
                name: "workingDays",
                widget: "string",
                required: false,
                hint: "Example: Monday-Friday",
              },
              {
                label: "Job Timing",
                name: "jobTiming",
                widget: "string",
                required: false,
                hint: "Example: 9:30 AM - 6:30 PM IST",
              },
              {
                label: "Apply Link",
                name: "applyLink",
                widget: "string",
                required: true,
                pattern: [
                  "^(https?://|/).+",
                  "Use an external URL (http/https) or internal path (/apply/...)",
                ],
              },
              {
                label: "Application Start Date",
                name: "applicationStartDate",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: true,
                default: "{{now}}",
              },
              {
                label: "Application End Date",
                name: "applicationEndDate",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: false,
                hint: "Jobs with this date are auto-hidden after expiry. If empty, jobs are auto-hidden after 30 days.",
              },
            ],
          },
          {
            name: "blogs",
            label: "Blogs",
            folder: "content/blogs",
            create: true,
            delete: true,
            extension: "md",
            format: "frontmatter",
            slug: "{{slug}}",
            identifier_field: "title",
            summary: "{{date}} | {{title}} - {{topic}}",
            sortable_fields: ["date"],
            sort: "date:desc",
            fields: [
              { label: "Title", name: "title", widget: "string", required: true },
              {
                label: "Slug",
                name: "slug",
                widget: "string",
                required: true,
                hint: "Use lowercase words separated by hyphens. Example: interview-tips-freshers",
              },
              { label: "Summary", name: "summary", widget: "text", required: false },
              {
                label: "Topic",
                name: "topic",
                widget: "string",
                required: true,
                hint: "Examples: Interview Prep, Resume, AI, Hiring News",
              },
              { label: "Tags", name: "tags", widget: "list", required: false },
              {
                label: "Mark as Trending",
                name: "isTrending",
                widget: "boolean",
                required: false,
                default: false,
              },
              { label: "Author", name: "author", widget: "string", required: false },
              {
                label: "Cover Image",
                name: "coverImage",
                widget: "image",
                required: false,
                hint: "Best option: upload the image here. If you paste a URL, use a direct image URL from a stable source. Avoid Google image result links, LinkedIn, or temporary signed links.",
              },
              {
                label: "CTA Label",
                name: "ctaLabel",
                widget: "string",
                required: false,
                hint: "Optional: Example Register Now, Apply Now, Join Event",
              },
              {
                label: "CTA Link",
                name: "ctaLink",
                widget: "string",
                required: false,
                pattern: ["^https?://.+", "Use a full http/https URL."],
              },
              {
                label: "Publish Date",
                name: "date",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: true,
              },
              { label: "Content", name: "body", widget: "markdown", required: true },
            ],
          },
        ],
      };

      function initCms() {
        if (window.jobAdviceCmsInitialized) {
          return;
        }

        if (!window.CMS || typeof window.initCMS !== "function") {
          window.setTimeout(initCms, 120);
          return;
        }

        window.jobAdviceCmsInitialized = true;
        window.initCMS({
          config: window.jobAdviceCmsConfig,
        });
      }

      function loadCmsScripts() {
        var primary = document.createElement("script");
        primary.onload = initCms;
        primary.src = "https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js";
        primary.onerror = function () {
          var fallback = document.createElement("script");
          fallback.onload = initCms;
          fallback.src = "https://cdn.jsdelivr.net/npm/decap-cms@3.8.3/dist/decap-cms.js";
          document.body.appendChild(fallback);
        };
        document.body.appendChild(primary);
      }

      function waitForLocalProxy() {
        var attempts = 0;
        var maxAttempts = 40;

        updateLoadingCopy(
          "Local Admin",
          "Waiting for the local CMS proxy on port 8081...",
          "JobAdvice Local",
        );

        function checkProxy() {
          attempts += 1;

          fetch("http://localhost:8081/api/v1", {
            method: "GET",
            mode: "no-cors",
            cache: "no-store",
          })
            .then(function () {
              updateLoadingCopy(
                "Local Admin",
                "Local CMS proxy connected. Opening the editor...",
                "JobAdvice Local",
              );
              loadCmsScripts();
            })
            .catch(function () {
              if (attempts >= maxAttempts) {
                updateLoadingCopy(
                  "Local Admin",
                  "Run npm run local:admin or npm run cms:proxy. Localhost uses the local CMS proxy instead of GitHub login.",
                  "JobAdvice Local",
                );
                return;
              }

              window.setTimeout(checkProxy, 500);
            });
        }

        checkProxy();
      }

      if (isLocalHost) {
        waitForLocalProxy();
      } else {
        loadCmsScripts();
      }
    </script>

    <script>
      (function applyCmsEnhancements() {
        var attempts = 0;

        function hideLoadingWhenReady() {
          var loadingScreen = document.getElementById("admin-loading");
          var cmsRoot = document.getElementById("nc-root");

          if (loadingScreen && cmsRoot && cmsRoot.children.length > 0) {
            loadingScreen.classList.add("is-hidden");
            return;
          }

          if (attempts < 180) {
            attempts += 1;
            window.setTimeout(hideLoadingWhenReady, 120);
          }
        }

        function registerPreviewStyles() {
          if (window.CMS && typeof window.CMS.registerPreviewStyle === "function") {
            window.CMS.registerPreviewStyle("/admin/preview.css");
            return;
          }

          if (attempts < 180) {
            attempts += 1;
            window.setTimeout(registerPreviewStyles, 120);
          }
        }

        hideLoadingWhenReady();
        registerPreviewStyles();
      })();
    </script>
    <script>
      (function proxyAdminPreviewImages() {
        var observer = null;

        function toProxyUrl(value) {
          var normalizedValue = String(value || "").trim();
          if (!normalizedValue) {
            return "";
          }

          if (normalizedValue.indexOf("/api/image?url=") === 0) {
            return normalizedValue;
          }

          try {
            var parsedUrl = new URL(normalizedValue, window.location.origin);
            if (!/^https?:$/i.test(parsedUrl.protocol)) {
              return normalizedValue;
            }

            if (parsedUrl.origin === window.location.origin) {
              return parsedUrl.toString();
            }

            return "/api/image?url=" + encodeURIComponent(parsedUrl.toString());
          } catch {
            return normalizedValue;
          }
        }

        function rewritePreviewImages(root) {
          if (!root) {
            return;
          }

          var images = root.querySelectorAll("img");
          for (var index = 0; index < images.length; index += 1) {
            var image = images[index];
            var originalSrc = image.getAttribute("src") || "";

            if (!originalSrc || originalSrc.indexOf("/api/image?url=") === 0) {
              continue;
            }

            var proxiedSrc = toProxyUrl(originalSrc);
            if (!proxiedSrc || proxiedSrc === originalSrc) {
              continue;
            }

            image.setAttribute("data-jobadvice-original-src", originalSrc);
            image.setAttribute("src", proxiedSrc);
            image.removeAttribute("srcset");
          }
        }

        function startObserving(root) {
          if (!root || observer) {
            return;
          }

          observer = new MutationObserver(function () {
            rewritePreviewImages(root);
          });

          observer.observe(root, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ["src"],
          });

          rewritePreviewImages(root);
        }

        function waitForRoot(attempts) {
          var root = document.getElementById("nc-root");
          if (root) {
            startObserving(root);
            return;
          }

          if (attempts > 180) {
            return;
          }

          window.setTimeout(function () {
            waitForRoot(attempts + 1);
          }, 250);
        }

        waitForRoot(0);
      })();
    </script>
    <script>
      (function warnOnRiskyCoverImageUrls() {
        var observer = null;
        var warningAttribute = "data-jobadvice-cover-image-warning";
        var boundAttribute = "data-jobadvice-cover-image-bound";
        var riskyHostPatterns = [
          /(^|\.)google\./i,
          /(^|\.)gstatic\.com$/i,
          /(^|\.)linkedin\.com$/i,
          /(^|\.)licdn\.com$/i,
          /(^|\.)economictimes\.com$/i,
          /(^|\.)moneycontrol\.com$/i,
          /(^|\.)facebook\.com$/i,
          /(^|\.)fbcdn\.net$/i,
          /(^|\.)instagram\.com$/i,
          /(^|\.)twimg\.com$/i,
          /(^|\.)x\.com$/i,
          /(^|\.)twitter\.com$/i,
        ];
        var stableDirectHosts = [
          "images.unsplash.com",
          "images.pexels.com",
          "cdn.pixabay.com",
          "pixabay.com",
          "images.ctfassets.net",
          "res.cloudinary.com",
        ];
        var imageExtensionPattern = /\.(avif|gif|jpe?g|png|svg|webp)(?:$|[?#])/i;

        function normalizeText(value) {
          return String(value || "").trim();
        }

        function isCoverImageField(field) {
          if (
            !field ||
            !(field instanceof HTMLInputElement || field instanceof HTMLTextAreaElement)
          ) {
            return false;
          }

          var fieldName = normalizeText(field.name || field.id).toLowerCase();
          if (fieldName.indexOf("coverimage") >= 0 || fieldName.indexOf("cover-image") >= 0) {
            return true;
          }

          var labelNode = field.closest("div");
          if (!labelNode) {
            return false;
          }

          var labelText = normalizeText(labelNode.textContent).toLowerCase();
          return labelText.indexOf("cover image") >= 0;
        }

        function getWarningNode(field) {
          var fieldContainer = field.parentElement;
          if (!fieldContainer) {
            return null;
          }

          var existingNode = fieldContainer.querySelector("[" + warningAttribute + "]");
          if (existingNode) {
            return existingNode;
          }

          var warningNode = document.createElement("p");
          warningNode.setAttribute(warningAttribute, "true");
          warningNode.style.margin = "8px 0 0";
          warningNode.style.fontSize = "12px";
          warningNode.style.lineHeight = "1.45";
          warningNode.style.display = "none";
          fieldContainer.appendChild(warningNode);
          return warningNode;
        }

        function classifyImageUrl(value) {
          var normalizedValue = normalizeText(value);
          if (!normalizedValue) {
            return null;
          }

          if (
            normalizedValue.indexOf("/uploads/") === 0 ||
            normalizedValue.indexOf("public/uploads/") === 0
          ) {
            return {
              tone: "safe",
              text: "Uploaded image path looks stable.",
            };
          }

          var parsedUrl = null;
          try {
            parsedUrl = new URL(normalizedValue, window.location.origin);
          } catch {
            return {
              tone: "warning",
              text: "Use a full http/https direct image URL, or upload the image instead.",
            };
          }

          if (!/^https?:$/i.test(parsedUrl.protocol)) {
            return {
              tone: "warning",
              text: "Use a full http/https direct image URL, or upload the image instead.",
            };
          }

          if (parsedUrl.origin === window.location.origin) {
            return {
              tone: "safe",
              text: "This local image URL should be stable.",
            };
          }

          var hostname = parsedUrl.hostname.replace(/^www\./, "").toLowerCase();
          var isRiskyHost = riskyHostPatterns.some(function (pattern) {
            return pattern.test(hostname);
          });

          if (isRiskyHost) {
            return {
              tone: "warning",
              text: "This host often blocks hotlinking or expires image URLs. Upload the image or use a stable direct image source.",
            };
          }

          var looksDirect =
            imageExtensionPattern.test(parsedUrl.pathname) ||
            stableDirectHosts.indexOf(hostname) >= 0 ||
            hostname.indexOf("images.") === 0 ||
            hostname.indexOf("cdn.") === 0;

          if (looksDirect) {
            return {
              tone: "safe",
              text: "This looks like a direct image URL.",
            };
          }

          return {
            tone: "warning",
            text: "This may be a page link or temporary URL, not a stable direct image. If preview breaks, upload the image instead.",
          };
        }

        function applyWarning(field) {
          var warningNode = getWarningNode(field);
          if (!warningNode) {
            return;
          }

          var result = classifyImageUrl(field.value);
          if (!result) {
            warningNode.textContent = "";
            warningNode.style.display = "none";
            return;
          }

          warningNode.textContent = result.text;
          warningNode.style.display = "block";
          warningNode.style.color =
            result.tone === "safe" ? "#0f766e" : "#b45309";
        }

        function bindField(field) {
          if (!isCoverImageField(field) || field.getAttribute(boundAttribute) === "true") {
            return;
          }

          field.setAttribute(boundAttribute, "true");
          field.addEventListener("input", function () {
            applyWarning(field);
          });
          field.addEventListener("change", function () {
            applyWarning(field);
          });
          applyWarning(field);
        }

        function bindFields(root) {
          if (!root) {
            return;
          }

          var fields = root.querySelectorAll("input, textarea");
          for (var index = 0; index < fields.length; index += 1) {
            bindField(fields[index]);
          }
        }

        function startObserving(root) {
          if (!root || observer) {
            return;
          }

          observer = new MutationObserver(function () {
            bindFields(root);
          });

          observer.observe(root, {
            childList: true,
            subtree: true,
          });

          bindFields(root);
        }

        function waitForRoot(attempts) {
          var root = document.getElementById("nc-root");
          if (root) {
            startObserving(root);
            return;
          }

          if (attempts > 180) {
            return;
          }

          window.setTimeout(function () {
            waitForRoot(attempts + 1);
          }, 250);
        }

        waitForRoot(0);
      })();
    </script>
    <script>
      (function warnOnLargeUploadedCoverImages() {
        var observer = null;
        var noticeAttribute = "data-jobadvice-cover-image-file-warning";
        var boundAttribute = "data-jobadvice-cover-image-file-bound";

        function normalizeText(value) {
          return String(value || "").trim();
        }

        function isImageUploadField(field) {
          if (!(field instanceof HTMLInputElement) || field.type !== "file") {
            return false;
          }

          var acceptValue = normalizeText(field.getAttribute("accept")).toLowerCase();
          if (acceptValue.indexOf("image") >= 0) {
            return true;
          }

          var container = field.closest("div");
          if (!container) {
            return false;
          }

          var labelText = normalizeText(container.textContent).toLowerCase();
          return (
            labelText.indexOf("cover image") >= 0 ||
            labelText.indexOf("thumbnail") >= 0 ||
            labelText.indexOf("replace with url") >= 0
          );
        }

        function getNoticeNode(field) {
          var container = field.parentElement;
          if (!container) {
            return null;
          }

          var existing = container.querySelector("[" + noticeAttribute + "]");
          if (existing) {
            return existing;
          }

          var notice = document.createElement("p");
          notice.setAttribute(noticeAttribute, "true");
          notice.style.margin = "8px 0 0";
          notice.style.fontSize = "12px";
          notice.style.lineHeight = "1.45";
          notice.style.display = "none";
          container.appendChild(notice);
          return notice;
        }

        function formatFileSize(sizeInBytes) {
          if (sizeInBytes >= 1024 * 1024) {
            return (sizeInBytes / (1024 * 1024)).toFixed(1) + " MB";
          }

          return Math.max(1, Math.round(sizeInBytes / 1024)) + " KB";
        }

        function describeFile(file) {
          if (!file) {
            return null;
          }

          var isImage = /^image\//i.test(file.type || "");
          if (!isImage) {
            return {
              tone: "warning",
              text: "Selected file is not a normal image. Use JPG, PNG, or WEBP.",
            };
          }

          if (file.size > 5 * 1024 * 1024) {
            return {
              tone: "warning",
              text:
                "Large image (" +
                formatFileSize(file.size) +
                "). Mobile publish may fail. Compress it below 2 MB if possible.",
            };
          }

          if (file.size > 2 * 1024 * 1024) {
            return {
              tone: "warning",
              text:
                "Image size is " +
                formatFileSize(file.size) +
                ". It may still work, but smaller JPG/WEBP files publish more reliably on mobile.",
            };
          }

          return {
            tone: "safe",
            text:
              "Selected image: " +
              formatFileSize(file.size) +
              ". This size should usually publish fine.",
          };
        }

        function updateNotice(field) {
          var notice = getNoticeNode(field);
          if (!notice) {
            return;
          }

          var file = field.files && field.files[0] ? field.files[0] : null;
          var message = describeFile(file);

          if (!message) {
            notice.textContent = "";
            notice.style.display = "none";
            return;
          }

          notice.textContent = message.text;
          notice.style.display = "block";
          notice.style.color = message.tone === "safe" ? "#0f766e" : "#b45309";
        }

        function bindField(field) {
          if (!isImageUploadField(field) || field.getAttribute(boundAttribute) === "true") {
            return;
          }

          field.setAttribute(boundAttribute, "true");
          field.addEventListener("change", function () {
            updateNotice(field);
          });
          updateNotice(field);
        }

        function bindFields(root) {
          if (!root) {
            return;
          }

          var fields = root.querySelectorAll('input[type="file"]');
          for (var index = 0; index < fields.length; index += 1) {
            bindField(fields[index]);
          }
        }

        function startObserving(root) {
          if (!root || observer) {
            return;
          }

          observer = new MutationObserver(function () {
            bindFields(root);
          });

          observer.observe(root, {
            childList: true,
            subtree: true,
          });

          bindFields(root);
        }

        function waitForRoot(attempts) {
          var root = document.getElementById("nc-root");
          if (root) {
            startObserving(root);
            return;
          }

          if (attempts > 180) {
            return;
          }

          window.setTimeout(function () {
            waitForRoot(attempts + 1);
          }, 250);
        }

        waitForRoot(0);
      })();
    </script>

        async function readJsonResponse(response) {
          var contentType = String(response.headers.get("content-type") || "").toLowerCase();
          var rawText = await response.text();

          if (!rawText) {
            return null;
          }

          if (contentType.indexOf("application/json") === -1) {
            return null;
          }

          try {
            return JSON.parse(rawText);
          } catch {
            return null;
          }
        }

        async function getSessionUser() {
          var response = await fetch("/api/auth/session", {
            credentials: "same-origin",
          });

          if (!response.ok) {
            return null;
          }

          var result = await readJsonResponse(response);
          if (!result || !result.user) {
            return null;
          }

          return result.user;
        }

        function getInitials(value) {
          var safeValue = (value || "Admin").trim();
          return (
            safeValue
              .split(/\s+/)
              .slice(0, 2)
              .map(function (part) {
                return part.charAt(0).toUpperCase();
              })
              .join("") || "A"
          );

        async function signOutAdmin() {
          var csrfResponse = await fetch("/api/auth/csrf", {
            credentials: "same-origin",
          });
          var csrfResult = await readJsonResponse(csrfResponse);

          if (!csrfResult || !csrfResult.csrfToken) {

          var form = document.createElement("form");

            if (event.key === "Escape") {

          panel.appendChild(topRow);
          panel.appendChild(logoutButton);
          wrapper.appendChild(trigger);
          wrapper.appendChild(panel);

        var pollTimer = window.setInterval(function () {

          if (
            document.getElementById(panelId) &&
            document.getElementById(triggerId)

          getSessionUser()

              buildAccountMenu(user);
              clearInterval(pollTimer);

            .catch(function () {
              if (pollAttempts > 20) {
                clearInterval(pollTimer);
              }
            });
        }, 1000);

    <script>
      (function injectAdminAutoExtract() {
        var panelId = "jobadvice-auto-extract-panel";
        var buttonId = "jobadvice-auto-extract-btn";
        var sourceTextareaId = "jobadvice-auto-extract-source";
        var collapseToggleId = "jobadvice-auto-extract-collapse";
        var clearButtonId = "jobadvice-auto-extract-clear";
        var collapseStorageKey = "jobadvice_auto_extract_collapsed";

        function getCollectionFromHash() {
          var routeValue = (window.location.pathname || "") + (window.location.hash || "");
          var match = routeValue.match(/collections\/([^/]+)/i);
          return match && match[1] ? match[1].toLowerCase() : "";
        }

        function isSupportedCollection(collection) {
          return collection === "jobs" || collection === "blogs";
        }

        function getEditorRoot() {
          return (
            document.querySelector(".nc-entryEditor") ||
            document.querySelector(".nc-entryEditor-container") ||
            document.getElementById("nc-root") ||
            document.body
          );
        }

        function removePanel() {
          var existingPanel = document.getElementById(panelId);
          if (existingPanel) {
            existingPanel.remove();
          }
        }

        function getPanelCollapsedState() {
          try {
            return window.localStorage.getItem(collapseStorageKey) === "1";
          } catch {
            return false;
          }
        }

        function setPanelCollapsedState(isCollapsed) {
          try {
            window.localStorage.setItem(collapseStorageKey, isCollapsed ? "1" : "0");
          } catch {
            // Ignore localStorage errors.
          }
        }

        function getAdminLoginUrl() {
          return "/admin/login?callbackUrl=" + encodeURIComponent("/admin");
        }

        function redirectToAdminLogin() {
          window.location.href = getAdminLoginUrl();
        }

        async function ensureAdminSession() {
          var sessionResponse = await fetch("/api/auth/session", {
            credentials: "same-origin",
          });

          if (!sessionResponse.ok) {
            redirectToAdminLogin();
            throw new Error("Session expired. Redirecting to login...");
          }

          var sessionData = null;
          try {
            sessionData = await sessionResponse.json();
          } catch {
            sessionData = null;
          }

          if (!sessionData || !sessionData.user || !sessionData.user.email) {
            redirectToAdminLogin();
            throw new Error("Session expired. Redirecting to login...");
          }
        }

        async function readJsonOrThrow(response) {
          var contentType = String(response.headers.get("content-type") || "").toLowerCase();
          var responseText = await response.text();

          if (!responseText) {
            return {};
          }

          if (contentType.indexOf("application/json") === -1) {
            var normalizedText = responseText.trim();
            if (
              response.status === 401 ||
              normalizedText.slice(0, 20).toLowerCase().indexOf("<!doctype html") === 0 ||
              normalizedText.slice(0, 5).toLowerCase() === "<html"
            ) {
              throw new Error("SessionRequired");
            }

            throw new Error("Server returned a non-JSON response. Please retry.");
          }

          try {
            return JSON.parse(responseText);
          } catch {
            throw new Error("Invalid JSON response from server.");
          }
        }

        function dispatchFieldEvents(field) {
          field.dispatchEvent(new Event("input", { bubbles: true }));
          field.dispatchEvent(new Event("change", { bubbles: true }));
        }

        function setNativeValue(field, value) {
          var prototype = Object.getPrototypeOf(field);
          var valueDescriptor = Object.getOwnPropertyDescriptor(prototype, "value");

          if (valueDescriptor && typeof valueDescriptor.set === "function") {
            valueDescriptor.set.call(field, value);
            return;
          }

          field.value = value;
        }

        function setNativeCheckedValue(field, checkedValue) {
          var prototype = Object.getPrototypeOf(field);
          var checkedDescriptor = Object.getOwnPropertyDescriptor(prototype, "checked");

          if (checkedDescriptor && typeof checkedDescriptor.set === "function") {
            checkedDescriptor.set.call(field, checkedValue);
            return;
          }

          field.checked = checkedValue;
        }

        function normalizeText(value) {
          return String(value || "").trim();
        }

        function normalizeLabel(value) {
          return normalizeText(value)
            .toLowerCase()
            .replace(/\s+/g, " ");
        }

        function normalizeArrayValue(value) {
          if (Array.isArray(value)) {
            return value
              .map(function (item) {
                return normalizeText(item);
              })
              .filter(Boolean);
          }

          if (typeof value === "string") {
            return value
              .split(",")
              .map(function (item) {
                return item.trim();
              })
              .filter(Boolean);
          }

          return [];
        }

        function isEditableField(field) {
          if (!field) {
            return false;
          }

          var isInputLike =
            field instanceof HTMLInputElement ||
            field instanceof HTMLTextAreaElement ||
            field instanceof HTMLSelectElement;

          if (!isInputLike || field.disabled) {
            return false;
          }

          return !(field instanceof HTMLInputElement && field.type === "hidden");
        }

        function getFirstEditableField(fields) {
          for (var index = 0; index < fields.length; index += 1) {
            if (isEditableField(fields[index])) {
              return fields[index];
            }
          }

          return null;
        }

        function findFieldByLabel(editorRoot, labels) {
          if (!labels || labels.length === 0) {
            return null;
          }

          var normalizedLabels = labels
            .map(function (label) {
              return normalizeLabel(label);
            })
            .filter(Boolean);
          if (normalizedLabels.length === 0) {
            return null;
          }

          var labelNodes = editorRoot.querySelectorAll("label");
          for (var index = 0; index < labelNodes.length; index += 1) {
            var labelNode = labelNodes[index];
            var labelText = normalizeLabel(labelNode.textContent);
            var matches = normalizedLabels.some(function (labelValue) {
              return labelText === labelValue || labelText.indexOf(labelValue) >= 0;
            });

            if (!matches) {
              continue;
            }

            if (labelNode.htmlFor) {
              var linkedField = document.getElementById(labelNode.htmlFor);
              if (isEditableField(linkedField)) {
                return linkedField;
              }
            }

            var labelContainer = labelNode.parentElement;
            if (labelContainer) {
              var nestedField = getFirstEditableField(
                labelContainer.querySelectorAll("input, textarea, select"),
              );
              if (nestedField) {
                return nestedField;
              }
            }

            var nearestBlock = labelNode.closest("div");
            if (nearestBlock) {
              var blockField = getFirstEditableField(
                nearestBlock.querySelectorAll("input, textarea, select"),
              );
              if (blockField) {
                return blockField;
              }
            }
          }

          return null;
        }

        function findField(editorRoot, name, labels) {
          var directSelectors = [
            '[name="' + name + '"]',
            '[name$=".' + name + '"]',
            '[name*="' + name + '"]',
            '[id="' + name + '"]',
            '[id$="-' + name + '"]',
            '[id*="' + name + '"]',
          ];

          for (var index = 0; index < directSelectors.length; index += 1) {
            var directField = getFirstEditableField(
              editorRoot.querySelectorAll(directSelectors[index]),
            );
            if (directField) {
              return directField;
            }
          }

          return findFieldByLabel(editorRoot, labels);
        }

        function getListFields(editorRoot, name, labels) {
          var byName = editorRoot.querySelectorAll('[name^="' + name + '."]');
          if (byName.length > 0) {
            return byName;
          }

          var byLabel = findFieldByLabel(editorRoot, labels);
          if (!byLabel) {
            return byName;
          }

          var listContainer = byLabel.closest("div");
          if (!listContainer) {
            return byName;
          }

          return listContainer.querySelectorAll('input[type="text"], input:not([type]), textarea');
        }

        function ensureListFields(editorRoot, name, labels, requiredLength) {
          var listFields = getListFields(editorRoot, name, labels);
          if (listFields.length >= requiredLength) {
            return listFields;
          }

          var searchTerms = [name, name.replace(/ies$/i, "y").replace(/s$/i, "")]
            .concat(labels || [])
            .map(function (value) {
              return normalizeLabel(value);
            })
            .filter(Boolean);

          var buttons = editorRoot.querySelectorAll("button");
          for (var index = 0; index < buttons.length; index += 1) {
            var button = buttons[index];
            var buttonText = normalizeLabel(button.textContent);

            var isAddButton = buttonText.indexOf("add ") === 0;
            var matchesField = searchTerms.some(function (term) {
              return buttonText.indexOf(term) >= 0;
            });

            if (!isAddButton || !matchesField) {
              continue;
            }

            while (listFields.length < requiredLength) {
              var previousLength = listFields.length;
              button.click();
              listFields = getListFields(editorRoot, name, labels);
              if (listFields.length <= previousLength) {
                break;
              }
            }

            if (listFields.length >= requiredLength) {
              break;
            }
          }

          return listFields;
        }

        function setSelectValue(field, rawValue) {
          var normalizedTarget = normalizeLabel(rawValue);
          var optionMatch = null;

          for (var optionIndex = 0; optionIndex < field.options.length; optionIndex += 1) {
            var option = field.options[optionIndex];
            if (
              normalizeLabel(option.value) === normalizedTarget ||
              normalizeLabel(option.textContent) === normalizedTarget
            ) {
              optionMatch = option;
              break;
            }
          }

          setNativeValue(field, optionMatch ? optionMatch.value : rawValue);
        }

        function setFieldValue(editorRoot, config) {
          var name = config.name;
          var labels = config.labels || [];
          var value = config.value;
          var isList = Boolean(config.isList);
          var isCheckbox = Boolean(config.isCheckbox);

          if (isCheckbox) {
            if (value !== true) {
              return "skipped";
            }

            var checkboxField = findField(editorRoot, name, labels);
            if (!(checkboxField instanceof HTMLInputElement) || checkboxField.type !== "checkbox") {
              return "missing";
            }

            setNativeCheckedValue(checkboxField, true);
            dispatchFieldEvents(checkboxField);
            return "updated";
          }

          if (isList) {
            var listValues = normalizeArrayValue(value);
            if (listValues.length === 0) {
              return "skipped";
            }

            var listFields = ensureListFields(
              editorRoot,
              name,
              labels,
              Math.max(listValues.length, 1),
            );

            if (listFields.length === 0) {
              return "missing";
            }

            if (listFields.length === 1) {
              var singleListField = listFields[0];
              if (isEditableField(singleListField)) {
                setNativeValue(singleListField, listValues.join(", "));
                dispatchFieldEvents(singleListField);
                return "updated";
              }
            }

            for (var listIndex = 0; listIndex < listFields.length; listIndex += 1) {
              var listField = listFields[listIndex];
              if (!isEditableField(listField)) {
                continue;
              }

              var listValue = "";
              if (listValues.length > listFields.length && listIndex === listFields.length - 1) {
                listValue = listValues.slice(listIndex).join(", ");
              } else {
                listValue =
                  typeof listValues[listIndex] === "undefined"
                    ? ""
                    : String(listValues[listIndex]);
              }
              setNativeValue(listField, listValue);
              dispatchFieldEvents(listField);
            }

            return "updated";
          }

          var normalizedValue = normalizeText(value);
          if (!normalizedValue) {
            return "skipped";
          }

          var field = findField(editorRoot, name, labels);
          if (!field) {
            return "missing";
          }

          if (field instanceof HTMLSelectElement) {
            setSelectValue(field, normalizedValue);
          } else {
            setNativeValue(field, normalizedValue);
          }

          dispatchFieldEvents(field);
          return "updated";
        }

        function createApplySummary() {
          return {
            updated: 0,
            skipped: 0,
            missing: 0,
          };
        }

        function recordApplyStatus(summary, status) {
          if (status === "updated") {
            summary.updated += 1;
            return;
          }

          if (status === "missing") {
            summary.missing += 1;
            return;
          }

          summary.skipped += 1;
        }

        function applyJobData(editorRoot, data) {
          var summary = createApplySummary();
          var fields = [
            { name: "title", labels: ["job title", "title"], value: data.title },
            { name: "date", labels: ["publish date", "date"], value: data.date },
            { name: "company", labels: ["company name", "company"], value: data.company },
            { name: "location", labels: ["location"], value: data.location },
            { name: "workMode", labels: ["work mode"], value: data.workMode },
            { name: "employmentType", labels: ["employment type"], value: data.employmentType },
            { name: "salary", labels: ["salary"], value: data.salary },
            {
              name: "experience",
              labels: ["experience required", "experience"],
              value: data.experience,
            },
            {
              name: "eligibilityCriteria",
              labels: ["eligibility criteria", "eligibility", "candidate profile"],
              value: data.eligibilityCriteria,
            },
            { name: "education", labels: ["education"], value: data.education, isList: true },
            {
              name: "skills",
              labels: ["skills required", "skills"],
              value: data.skills,
              isList: true,
            },
            {
              name: "responsibilities",
              labels: ["roles & responsibilities", "responsibilities", "role and responsibilities"],
              value: data.responsibilities,
              isList: true,
            },
            { name: "workingDays", labels: ["working days"], value: data.workingDays },
            { name: "jobTiming", labels: ["job timing"], value: data.jobTiming },
            { name: "applyLink", labels: ["apply link"], value: data.applyLink },
            {
              name: "applicationStartDate",
              labels: ["application start date"],
              value: data.applicationStartDate,
            },
            {
              name: "applicationEndDate",
              labels: ["application end date"],
              value: data.applicationEndDate,
            },
          ];

          for (var index = 0; index < fields.length; index += 1) {
            recordApplyStatus(summary, setFieldValue(editorRoot, fields[index]));
          }

          return summary;
        }

        function applyBlogData(editorRoot, data) {
          var summary = createApplySummary();
          var fields = [
            { name: "title", labels: ["title"], value: data.title },
            { name: "slug", labels: ["slug"], value: data.slug },
            { name: "summary", labels: ["summary"], value: data.summary },
            { name: "topic", labels: ["topic"], value: data.topic },
            { name: "tags", labels: ["tags"], value: data.tags, isList: true },
            { name: "isTrending", labels: ["mark as trending", "trending"], value: data.isTrending, isCheckbox: true },
            { name: "author", labels: ["author"], value: data.author },
            { name: "coverImage", labels: ["cover image", "image", "thumbnail"], value: data.coverImage },
            { name: "date", labels: ["publish date", "date"], value: data.date },
            { name: "body", labels: ["content", "body"], value: data.body },
          ];

          for (var index = 0; index < fields.length; index += 1) {
            recordApplyStatus(summary, setFieldValue(editorRoot, fields[index]));
          }

          return summary;
        }

        async function runAutoExtract(button) {
          var editorRoot = getEditorRoot() || document;
          var collection = getCollectionFromHash();

          if (!isSupportedCollection(collection)) {
            alert("Auto extraction is available only for Jobs and Blogs entry forms.");
            return;
          }

          await ensureAdminSession();

          var sourceTextarea = document.getElementById(sourceTextareaId);
          var manualSourceText =
            sourceTextarea instanceof HTMLTextAreaElement
              ? String(sourceTextarea.value || "").trim()
              : "";

          var sourceText = manualSourceText;
          if (!sourceText && collection === "blogs") {
            var sourceField =
              editorRoot.querySelector('[name="body"]') ||
              document.querySelector('textarea[name="body"]') ||
              document.querySelector('input[name="body"]');
            if (sourceField) {
              sourceText = String(sourceField.value || "").trim();
            }
          }

          if (!sourceText) {
            alert("Paste full source content into the Auto Extract panel textarea first.");
            return;
          }

          button.disabled = true;
          button.textContent = "Extracting...";
          var requestTimeoutId = null;

          try {
            var requestController = new AbortController();
            requestTimeoutId = window.setTimeout(function () {
              requestController.abort();
            }, 25_000);

            var response = await fetch("/api/admin/auto-extract", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              credentials: "same-origin",
              signal: requestController.signal,
              body: JSON.stringify({
                collection: collection,
                sourceText: sourceText,
              }),
            });
            window.clearTimeout(requestTimeoutId);

            var result = await readJsonOrThrow(response);

            if (!response.ok || !result || !result.success) {
              if (result && result.error === "SessionRequired") {
                redirectToAdminLogin();
                throw new Error("Session expired. Redirecting to login...");
              }

              if (result && result.error === "EmailNotAllowed") {
                throw new Error("This Google account is not allowed for admin auto extract.");
              }

              throw new Error(
                (result && result.error) || "Auto extraction failed",
              );
            }

            if (!result.data || typeof result.data !== "object") {
              throw new Error("Invalid extraction payload");
            }

            var fillSummary =
              collection === "jobs"
                ? applyJobData(editorRoot, result.data)
                : applyBlogData(editorRoot, result.data);

            var completionMessage =
              "Auto extraction completed (" +
              (result.mode || "fallback") +
              "). Updated " +
              fillSummary.updated +
              " field(s)";

            if (fillSummary.skipped > 0) {
              completionMessage += ", skipped " + fillSummary.skipped + " empty field(s)";
            }

            if (fillSummary.missing > 0) {
              completionMessage += ", " + fillSummary.missing + " field(s) were not found";
            }

            completionMessage += ".";

            if (result.mode === "fallback") {
              var fallbackReason =
                typeof result.reason === "string" ? result.reason.trim() : "";
              completionMessage += fallbackReason
                ? " Fallback reason: " + fallbackReason + "."
                : " Fallback parser was used.";
            }

            if (fillSummary.updated === 0) {
              completionMessage += " No fields were filled. Try richer structured text.";
            }

            completionMessage += " Please review before publishing.";
            alert(completionMessage);
          } catch (error) {
            var message =
              error && error.message ? error.message : "Auto extraction failed";
            if (String(message).toLowerCase().indexOf("abort") >= 0) {
              message = "Extraction timed out. Please shorten content or try again.";
            }
            if (
              String(message).indexOf("SessionRequired") >= 0 ||
              String(message).toLowerCase().indexOf("session expired") >= 0 ||
              String(message).toLowerCase().indexOf("unauthorized") >= 0
            ) {
              redirectToAdminLogin();
              return;
            }
            alert(message);
          } finally {
            if (requestTimeoutId) {
              window.clearTimeout(requestTimeoutId);
            }
            button.disabled = false;
            button.textContent = "Auto Extract with AI";
          }
        }

        function injectPanel() {
          var collection = getCollectionFromHash();

          if (!isSupportedCollection(collection)) {
            removePanel();
            return;
          }

          if (document.getElementById(panelId)) {
            return;
          }

          var isCollapsed = getPanelCollapsedState();
          var panel = document.createElement("div");
          panel.id = panelId;
          panel.style.position = "fixed";
          panel.style.right = "18px";
          panel.style.bottom = "18px";
          panel.style.zIndex = "9999";
          panel.style.width = "min(430px, calc(100vw - 24px))";
          panel.style.padding = "12px";
          panel.style.borderRadius = "12px";
          panel.style.border = "1px solid rgba(15, 23, 42, 0.14)";
          panel.style.background = "rgba(255, 255, 255, 0.96)";
          panel.style.boxShadow = "0 12px 28px rgba(15, 23, 42, 0.16)";
          panel.style.backdropFilter = "blur(8px)";
          panel.style.fontFamily = "Manrope, sans-serif";

          var header = document.createElement("div");
          header.style.display = "flex";
          header.style.alignItems = "center";
          header.style.justifyContent = "space-between";
          header.style.gap = "10px";
          header.style.marginBottom = isCollapsed ? "0" : "10px";

          var title = document.createElement("p");
          title.textContent = collection === "jobs" ? "AI Job Extractor" : "AI Blog Extractor";
          title.style.margin = "0";
          title.style.fontSize = "13px";
          title.style.fontWeight = "800";
          title.style.color = "#0f172a";

          var collapseToggle = document.createElement("button");
          collapseToggle.id = collapseToggleId;
          collapseToggle.type = "button";
          collapseToggle.textContent = isCollapsed ? "Expand" : "Collapse";
          collapseToggle.style.padding = "6px 10px";
          collapseToggle.style.borderRadius = "8px";
          collapseToggle.style.border = "1px solid rgba(148, 163, 184, 0.85)";
          collapseToggle.style.background = "#ffffff";
          collapseToggle.style.color = "#0f172a";
          collapseToggle.style.fontSize = "11px";
          collapseToggle.style.fontWeight = "700";
          collapseToggle.style.cursor = "pointer";

          var helper = document.createElement("p");
          helper.textContent =
            collection === "jobs"
              ? "Paste full job source text and auto-fill all fields."
              : "Paste full blog source text and auto-fill all fields.";
          helper.style.margin = "0 0 8px";
          helper.style.fontSize = "12px";
          helper.style.color = "#334155";

          var sourceInput = document.createElement("textarea");
          sourceInput.id = sourceTextareaId;
          sourceInput.rows = 6;
          sourceInput.placeholder =
            collection === "jobs"
              ? "Paste complete job details text here for accurate extraction."
              : "Paste complete blog content/details here for accurate extraction.";
          sourceInput.style.width = "100%";
          sourceInput.style.minHeight = "110px";
          sourceInput.style.maxHeight = "260px";
          sourceInput.style.resize = "vertical";
          sourceInput.style.margin = "0";
          sourceInput.style.padding = "8px 10px";
          sourceInput.style.borderRadius = "8px";
          sourceInput.style.border = "1px solid rgba(148, 163, 184, 0.8)";
          sourceInput.style.fontSize = "12px";
          sourceInput.style.lineHeight = "1.5";
          sourceInput.style.color = "#0f172a";
          sourceInput.style.background = "#ffffff";

          if (collection === "blogs") {
            var existingBodyField =
              document.querySelector('textarea[name="body"]') ||
              document.querySelector('input[name="body"]');
            if (existingBodyField && existingBodyField.value) {
              sourceInput.value = String(existingBodyField.value || "").trim();
            }
          }

          var button = document.createElement("button");
          button.id = buttonId;
          button.type = "button";
          button.textContent = "Auto Extract with AI";
          button.style.padding = "9px 14px";
          button.style.borderRadius = "8px";
          button.style.border = "none";
          button.style.background = "#0f766e";
          button.style.color = "#ffffff";
          button.style.fontSize = "13px";
          button.style.fontWeight = "700";
          button.style.cursor = "pointer";
          button.style.flex = "1";

          button.addEventListener("click", function () {
            runAutoExtract(button);
          });

          var clearButton = document.createElement("button");
          clearButton.id = clearButtonId;
          clearButton.type = "button";
          clearButton.textContent = "Clear";
          clearButton.style.padding = "9px 12px";
          clearButton.style.borderRadius = "8px";
          clearButton.style.border = "1px solid rgba(148, 163, 184, 0.85)";
          clearButton.style.background = "#ffffff";
          clearButton.style.color = "#0f172a";
          clearButton.style.fontSize = "12px";
          clearButton.style.fontWeight = "700";
          clearButton.style.cursor = "pointer";

          clearButton.addEventListener("click", function () {
            sourceInput.value = "";
            sourceInput.focus();
          });

          collapseToggle.addEventListener("click", function () {
            setPanelCollapsedState(!isCollapsed);
            removePanel();
            injectPanel();
          });

          var actionRow = document.createElement("div");
          actionRow.style.display = "flex";
          actionRow.style.gap = "8px";
          actionRow.style.marginTop = "10px";

          actionRow.appendChild(button);
          actionRow.appendChild(clearButton);

          panel.appendChild(header);
          header.appendChild(title);
          header.appendChild(collapseToggle);

          if (!isCollapsed) {
            panel.appendChild(helper);
            panel.appendChild(sourceInput);
            panel.appendChild(actionRow);
          }

          document.body.appendChild(panel);
        }

        window.setInterval(injectPanel, 1200);
        window.addEventListener("hashchange", injectPanel);
        injectPanel();
      })();
    </script>
    <script src="/admin/jobs-dashboard-tools.js?v=20260309a"></script>
  </body>
