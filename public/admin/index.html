    <script>
      (function ensureFreshAdminShell() {
        var currentVersion = "20260314n";
        var params = new URLSearchParams(window.location.search || "");
        if (params.get("jobadvice_admin_v") === currentVersion) {
          return;
        }

        params.set("jobadvice_admin_v", currentVersion);
        window.location.replace(
          window.location.pathname + "?" + params.toString() + (window.location.hash || ""),
        );
      })();
    </script>
    <script>
      var isLocalHost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";
      var loadingBadge = document.getElementById("admin-loading");

      function updateLoadingCopy(title, message, badgeText) {
        var loadingScreen = document.getElementById("admin-loading");
        if (!loadingScreen) {
          return;
        }

        var badgeNode = loadingScreen.querySelector(".admin-loading-badge");
        var titleNode = loadingScreen.querySelector("h1");
        var messageNode = loadingScreen.querySelector("p:last-of-type");

        if (badgeNode && badgeText) {
          badgeNode.textContent = badgeText;
        }

        if (titleNode && title) {
          titleNode.textContent = title;
        }

        if (messageNode && message) {
          messageNode.textContent = message;
        }
      }

      window.CMS_MANUAL_INIT = true;
      window.jobAdviceCmsConfig = {
        load_config_file: false,
        backend: {
          name: "github",
          repo: "hassanusmani21/Jobadvice",
          branch: "main",
          base_url: window.location.origin,
          auth_endpoint: "api/decap/auth",
        },
        local_backend: {
          url: "http://localhost:8081/api/v1",
          allowed_hosts: ["localhost", "127.0.0.1"],
        },
        logo_url: "/favicon.ico",
        media_folder: "public/uploads",
        public_folder: "/uploads",
        collections: [
          {
            name: "jobs",
            label: "Jobs",
            folder: "content/jobs",
            create: true,
            delete: true,
            extension: "md",
            format: "frontmatter",
            slug: "{{slug}}",
            identifier_field: "title",
            summary: "{{date}} | {{title}} - {{company}}",
            sortable_fields: ["date"],
            sort: "date:desc",
            fields: [
              { label: "Job Title", name: "title", widget: "string", required: true },
              {
                label: "Publish Date",
                name: "date",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: true,
                default: "{{now}}",
              },
              { label: "Company Name", name: "company", widget: "string", required: true },
              {
                label: "Location",
                name: "location",
                widget: "string",
                required: true,
                hint: "City, State, Country or Remote",
              },
              {
                label: "Work Mode",
                name: "workMode",
                widget: "string",
                required: false,
                hint: "Examples: On-site, Remote, Hybrid",
              },
              {
                label: "Employment Type",
                name: "employmentType",
                widget: "string",
                required: false,
                hint: "Examples: Full-time, Part-time, Internship, Contract",
              },
              { label: "Salary", name: "salary", widget: "string", required: false },
              {
                label: "Experience Required",
                name: "experience",
                widget: "string",
                required: false,
                hint: "Examples: Fresher, 1-3 years, 3+ years",
              },
              {
                label: "Eligibility Criteria",
                name: "eligibilityCriteria",
                widget: "text",
                required: false,
                hint: "Multiple lines supported. Put one eligibility point per line.",
              },
              {
                label: "Education",
                name: "education",
                widget: "list",
                required: false,
                hint: "Add one item per line. Example: B.Tech, MCA",
              },
              {
                label: "Skills Required",
                name: "skills",
                widget: "list",
                required: true,
                hint: "Add one skill per item. Example: Selenium, SQL, Python",
              },
              {
                label: "Roles & Responsibilities",
                name: "responsibilities",
                widget: "list",
                required: false,
                hint: "Add one responsibility per item.",
              },
              {
                label: "Working Days",
                name: "workingDays",
                widget: "string",
                required: false,
                hint: "Example: Monday-Friday",
              },
              {
                label: "Job Timing",
                name: "jobTiming",
                widget: "string",
                required: false,
                hint: "Example: 9:30 AM - 6:30 PM IST",
              },
              {
                label: "Apply Link",
                name: "applyLink",
                widget: "string",
                required: true,
                pattern: [
                  "^(https?://|/).+",
                  "Use an external URL (http/https) or internal path (/apply/...)",
                ],
              },
              {
                label: "Application Start Date",
                name: "applicationStartDate",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: true,
                default: "{{now}}",
              },
              {
                label: "Application End Date",
                name: "applicationEndDate",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: false,
                hint: "Jobs with this date are auto-hidden after expiry. If empty, jobs are auto-hidden after 30 days.",
              },
            ],
          },
          {
            name: "blogs",
            label: "Blogs",
            folder: "content/blogs",
            create: true,
            delete: true,
            extension: "md",
            format: "frontmatter",
            slug: "{{slug}}",
            identifier_field: "title",
            summary: "{{date}} | {{title}} - {{topic}}",
            sortable_fields: ["date"],
            sort: "date:desc",
            fields: [
              { label: "Title", name: "title", widget: "string", required: true },
              {
                label: "Slug",
                name: "slug",
                widget: "string",
                required: true,
                hint: "Use lowercase words separated by hyphens. Example: interview-tips-freshers",
              },
              { label: "Summary", name: "summary", widget: "text", required: false },
              {
                label: "Topic",
                name: "topic",
                widget: "string",
                required: true,
                hint: "Examples: Interview Prep, Resume, AI, Hiring News",
              },
              { label: "Tags", name: "tags", widget: "list", required: false },
              {
                label: "Mark as Trending",
                name: "isTrending",
                widget: "boolean",
                required: false,
                default: false,
              },
              { label: "Author", name: "author", widget: "string", required: false },
              {
                label: "Cover Image",
                name: "coverImage",
                widget: "image",
                required: false,
                hint: "Best option: upload the image here. If you paste a URL, use a direct image URL from a stable source. Avoid Google image result links, LinkedIn, or temporary signed links.",
              },
              {
                label: "CTA Label",
                name: "ctaLabel",
                widget: "string",
                required: false,
                hint: "Optional: Example Register Now, Apply Now, Join Event",
              },
              {
                label: "CTA Link",
                name: "ctaLink",
                widget: "string",
                required: false,
                pattern: ["^https?://.+", "Use a full http/https URL."],
              },
              {
                label: "Publish Date",
                name: "date",
                widget: "datetime",
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                required: true,
              },
              { label: "Content", name: "body", widget: "markdown", required: true },
            ],
          },
        ],
      };

      function initCms() {
        if (window.jobAdviceCmsInitialized) {
          return;
        }

        if (!window.CMS || typeof window.initCMS !== "function") {
          window.setTimeout(initCms, 120);
          return;
        }

        window.jobAdviceCmsInitialized = true;
        window.initCMS({
          config: window.jobAdviceCmsConfig,
        });
      }

      function loadCmsScripts() {
        var primary = document.createElement("script");
        primary.onload = initCms;
        primary.src = "https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js";
        primary.onerror = function () {
          var fallback = document.createElement("script");
          fallback.onload = initCms;
          fallback.src = "https://cdn.jsdelivr.net/npm/decap-cms@3.8.3/dist/decap-cms.js";
          document.body.appendChild(fallback);
        };
        document.body.appendChild(primary);
      }

      function waitForLocalProxy() {
        var attempts = 0;
        var maxAttempts = 40;

        updateLoadingCopy(
          "Local Admin",
          "Waiting for the local CMS proxy on port 8081...",
          "JobAdvice Local",
        );

        function checkProxy() {
          attempts += 1;

          fetch("http://localhost:8081/api/v1", {
            method: "GET",
            mode: "no-cors",
            cache: "no-store",
          })
            .then(function () {
              updateLoadingCopy(
                "Local Admin",
                "Local CMS proxy connected. Opening the editor...",
                "JobAdvice Local",
              );
              loadCmsScripts();
            })
            .catch(function () {
              if (attempts >= maxAttempts) {
                updateLoadingCopy(
                  "Local Admin",
                  "Run npm run local:admin or npm run cms:proxy. Localhost uses the local CMS proxy instead of GitHub login.",
                  "JobAdvice Local",
                );
                return;
              }

              window.setTimeout(checkProxy, 500);
            });
        }

        checkProxy();
      }

      if (isLocalHost) {
        waitForLocalProxy();
      } else {
        loadCmsScripts();
      }
    </script>
    <script>

    <script>
      (function enhanceResponsiveAdminLayout() {
        var observer = null;
        var scrollUnlockTimer = null;

        function isResponsiveViewport() {
          return window.matchMedia("(max-width: 900px)").matches;
        }

        function normalizeText(value) {
          return String(value || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
        }

        function getRouteState() {
          var routeValue = (window.location.hash || "").toLowerCase();
          return {
            isCollectionRoute: routeValue.indexOf("/collections/") >= 0,
            isEntryRoute: routeValue.indexOf("/entries/") >= 0,
          };
        }

        function findCollectionsPanel(root) {
          var textNodes = root.querySelectorAll("h1, h2, h3, h4, p, span, div");
          var heading = null;

          for (var index = 0; index < textNodes.length; index += 1) {
            if (normalizeText(textNodes[index].textContent) === "collections") {
              heading = textNodes[index];
              break;
            }
          }

          if (!heading) {
            return null;
          }

          var searchField =
            root.querySelector('input[placeholder*="Search"]') ||
            root.querySelector('input[placeholder*="search"]');
          var current = heading;

          for (var depth = 0; current && depth < 8; depth += 1) {
            if (
              current instanceof HTMLElement &&
              searchField &&
              current.contains(searchField)
            ) {
              return current;
            }
            current = current.parentElement;
          }

          return heading.parentElement;
        }

        function findResultsContainer(root) {
          var entryLinks = root.querySelectorAll(
            'a[href*="#/collections/"][href*="/entries/"]',
          );
          if (entryLinks.length === 0) {
            return null;
          }

          var firstLink = entryLinks[0];
          var current = firstLink.parentElement;

          while (current && current !== root) {
            if (
              current.querySelectorAll('a[href*="#/collections/"][href*="/entries/"]').length >=
              Math.min(2, entryLinks.length)
            ) {
              return current;
            }
            current = current.parentElement;
          }

          return firstLink.parentElement;
        }

        function findSharedContainer(root, firstNode, secondNode) {
          var current = firstNode;

          while (current && current !== root) {
            if (current.contains(secondNode)) {
              return current;
            }
            current = current.parentElement;
          }

          return null;
        }

        function clearResponsiveClasses(root) {
          document.body.classList.remove(
            "jobadvice-entry-view",
            "jobadvice-mobile-collection-view",
            "jobadvice-mobile-entry-view",
          );

          root.classList.remove(
            "jobadvice-entry-view",
            "jobadvice-mobile-collection-view",
            "jobadvice-mobile-entry-view",
          );

          var markedNodes = root.querySelectorAll(
            ".jobadvice-entry-toolbar-meta-duplicate, .jobadvice-mobile-collection-layout, .jobadvice-mobile-collections-panel, .jobadvice-mobile-collection-main, .jobadvice-mobile-collection-results-frame, .jobadvice-mobile-collection-results",
          );
          for (var index = 0; index < markedNodes.length; index += 1) {
            markedNodes[index].classList.remove(
              "jobadvice-entry-toolbar-meta-duplicate",
              "jobadvice-mobile-collection-layout",
              "jobadvice-mobile-collections-panel",
              "jobadvice-mobile-collection-main",
              "jobadvice-mobile-collection-results-frame",
              "jobadvice-mobile-collection-results",
            );
          }
        }

        function unlockDocumentScroll() {
          var html = document.documentElement;
          var body = document.body;
          if (!html || !body) {
            return;
          }

          html.style.height = "auto";
          html.style.maxHeight = "none";
          html.style.overflow = "auto";
          html.style.overflowY = "auto";
          body.style.height = "auto";
          body.style.maxHeight = "none";
          body.style.overflow = "auto";
          body.style.overflowY = "auto";
          body.style.position = "relative";
          html.style.touchAction = "auto";
          body.style.touchAction = "auto";
        }

        function unlockAncestorChain(root, node) {
          var current = node instanceof HTMLElement ? node.parentElement : null;

          while (current && current !== root && current !== document.body) {
            current.style.position = "static";
            current.style.top = "auto";
            current.style.right = "auto";
            current.style.bottom = "auto";
            current.style.left = "auto";
            current.style.height = "auto";
            current.style.minHeight = "0";
            current.style.maxHeight = "none";
            current.style.overflow = "visible";
            current.style.overflowY = "visible";
            current.style.overflowX = "visible";
            current.style.transform = "none";
            current.style.pointerEvents = "auto";
            current = current.parentElement;
          }
        }

        function hideNodeForMobile(node) {
          if (!(node instanceof HTMLElement)) {
            return;
          }

          node.classList.add("jobadvice-mobile-hidden-node");
          node.setAttribute("aria-hidden", "true");
          node.style.display = "none";
          node.style.visibility = "hidden";
          node.style.pointerEvents = "none";
          node.style.width = "0";
          node.style.minWidth = "0";
          node.style.maxWidth = "0";
          node.style.height = "0";
          node.style.minHeight = "0";
          node.style.maxHeight = "0";
          node.style.margin = "0";
          node.style.padding = "0";
          node.style.overflow = "hidden";
        }

        function decorateMobileEntryToolbar(root) {
          if (!isResponsiveViewport()) {
            return;
          }

          var appHeader = root.querySelector('[class*="AppHeader"]');
          if (appHeader) {
            appHeader.classList.add("jobadvice-mobile-entry-header");
          }

          var appHeaderActions = root.querySelector('[class*="AppHeaderActions"]');
          hideNodeForMobile(appHeaderActions);

          var toolbarContainer = root.querySelector('[class*="ToolbarContainer"]');
          if (!(toolbarContainer instanceof HTMLElement)) {
            return;
          }

          toolbarContainer.classList.add("jobadvice-mobile-entry-toolbar");

          var backSection = toolbarContainer.querySelector('[class*="ToolbarSectionBackLink"]');
          if (backSection) {
            backSection.classList.add("jobadvice-mobile-entry-backlink");
          }

          var mainSection = toolbarContainer.querySelector('[class*="ToolbarSectionMain"]');
          if (!(mainSection instanceof HTMLElement)) {
            return;
          }

          mainSection.classList.add("jobadvice-mobile-entry-actions");

          var actionGroups = mainSection.children;
          for (var index = 0; index < actionGroups.length; index += 1) {
            var actionGroup = actionGroups[index];
            if (!(actionGroup instanceof HTMLElement)) {
              continue;
            }

            actionGroup.classList.add("jobadvice-mobile-entry-action-group");

            var normalizedGroupText = normalizeText(actionGroup.textContent);
            if (!normalizedGroupText) {
              hideNodeForMobile(actionGroup);
              continue;
            }

            if (
              normalizedGroupText.indexOf("publish") >= 0 ||
              normalizedGroupText.indexOf("published") >= 0
            ) {
              actionGroup.classList.add("jobadvice-mobile-entry-publish-group");
            }

            if (normalizedGroupText.indexOf("delete") >= 0) {
              actionGroup.classList.add("jobadvice-mobile-entry-delete-group");
            }
          }

          var iconOnlyControls = toolbarContainer.querySelectorAll(
            'button, [role="button"], a, span',
          );

          for (var controlIndex = 0; controlIndex < iconOnlyControls.length; controlIndex += 1) {
            var control = iconOnlyControls[controlIndex];
            if (!(control instanceof HTMLElement)) {
              continue;
            }

            var controlText = normalizeText(control.textContent);
            var labelText = normalizeText(
              control.getAttribute("aria-label") || control.getAttribute("title"),
            );
            var isInsidePublishGroup = Boolean(
              control.closest(".jobadvice-mobile-entry-publish-group"),
            );
            var isInsideDeleteGroup = Boolean(
              control.closest(".jobadvice-mobile-entry-delete-group"),
            );

            if (controlText || labelText || isInsidePublishGroup || isInsideDeleteGroup) {
              continue;
            }

            hideNodeForMobile(control);
          }
        }

        function markDuplicateEntryToolbarMeta(root) {
          var toolbarMetaNodes = root.querySelectorAll('[class*="ToolbarSectionMeta"]');

          for (var index = 0; index < toolbarMetaNodes.length; index += 1) {
            var toolbarMeta = toolbarMetaNodes[index];
            var avatarButtons = toolbarMeta.querySelectorAll('[class*="AvatarDropdownButton"]');
            if (avatarButtons.length === 0) {
              continue;
            }

            var buttonLikeNodes = toolbarMeta.querySelectorAll('button, [role="button"]');
            var normalizedText = normalizeText(toolbarMeta.textContent);
            var containsOnlyAvatarButtons =
              buttonLikeNodes.length === avatarButtons.length && normalizedText === "";

            if (containsOnlyAvatarButtons) {
              toolbarMeta.classList.add("jobadvice-entry-toolbar-meta-duplicate");
              toolbarMeta.setAttribute("aria-hidden", "true");
              toolbarMeta.style.display = "none";
              toolbarMeta.style.width = "0";
              toolbarMeta.style.minWidth = "0";
              toolbarMeta.style.maxWidth = "0";
              toolbarMeta.style.margin = "0";
              toolbarMeta.style.padding = "0";
              toolbarMeta.style.overflow = "hidden";
              toolbarMeta.style.pointerEvents = "none";
            }
          }
        }

        function applyEntryResponsiveFixes(root) {
          if (!isResponsiveViewport()) {
            return;
          }

          unlockDocumentScroll();
          root.style.height = "auto";
          root.style.minHeight = "100vh";
          root.style.maxHeight = "none";
          root.style.overflow = "visible";
          root.style.overflowY = "visible";

          var layoutNodes = root.querySelectorAll(
            '[class*="Main"], [class*="EditorContainer"], [class*="Editor"], [class*="SplitPane"], [class*="ControlPaneContainer"], [class*="AppMainContainer"], [class*="Pane"]',
          );

          for (var index = 0; index < layoutNodes.length; index += 1) {
            var layoutNode = layoutNodes[index];
            layoutNode.style.position = "static";
            layoutNode.style.top = "auto";
            layoutNode.style.right = "auto";
            layoutNode.style.bottom = "auto";
            layoutNode.style.left = "auto";
            layoutNode.style.height = "auto";
            layoutNode.style.minHeight = "0";
            layoutNode.style.maxHeight = "none";
            layoutNode.style.flex = "none";
            layoutNode.style.overflow = "visible";
            layoutNode.style.overflowY = "visible";
            layoutNode.style.overflowX = "visible";
          }

          var toolbarNodes = root.querySelectorAll(
            '[class*="Toolbar"], [class*="ToolbarSection"], [class*="EditorToolbar"]',
          );

          for (var toolbarIndex = 0; toolbarIndex < toolbarNodes.length; toolbarIndex += 1) {
            var toolbarNode = toolbarNodes[toolbarIndex];
            toolbarNode.style.position = "static";
            toolbarNode.style.top = "auto";
            toolbarNode.style.right = "auto";
            toolbarNode.style.bottom = "auto";
            toolbarNode.style.left = "auto";
            toolbarNode.style.zIndex = "auto";
          }

          var hiddenNodes = root.querySelectorAll(
            '[class*="PreviewPaneContainer"]:not([class*="ControlPaneContainer"]), [class*="PreviewPaneFrame"], [class*="EditorToggle"], [class*="ToolbarSectionMeta"], [class*="ViewControls"], [class*="ViewControlsButton"], [class*="AvatarDropdownButton"]',
          );

          for (var hiddenIndex = 0; hiddenIndex < hiddenNodes.length; hiddenIndex += 1) {
            hiddenNodes[hiddenIndex].style.display = "none";
            hiddenNodes[hiddenIndex].style.visibility = "hidden";
            hiddenNodes[hiddenIndex].style.pointerEvents = "none";
          }

          var fieldNodes = root.querySelectorAll("input, textarea, select, button");
          for (var fieldIndex = 0; fieldIndex < fieldNodes.length; fieldIndex += 1) {
            unlockAncestorChain(root, fieldNodes[fieldIndex]);
          }
        }

        function applyResponsiveClasses() {
          var root = document.getElementById("nc-root");
          if (!root) {
            return;
          }

          clearResponsiveClasses(root);

          var routeState = getRouteState();

          if (routeState.isEntryRoute) {
            root.classList.add("jobadvice-entry-view");

          if (normalizedValue.indexOf("/api/image?url=") === 0) {
            return normalizedValue;

          try {

            if (parsedUrl.origin === window.location.origin) {

      (function warnOnRiskyCoverImageUrls() {
        var observer = null;

        var boundAttribute = "data-jobadvice-cover-image-bound";
        var riskyHostPatterns = [
          /(^|\.)google\./i,
          /(^|\.)gstatic\.com$/i,
          /(^|\.)linkedin\.com$/i,
          /(^|\.)licdn\.com$/i,
          /(^|\.)economictimes\.com$/i,

          "res.cloudinary.com",

          if (fieldName.indexOf("coverimage") >= 0 || fieldName.indexOf("cover-image") >= 0) {
            return true;
          }

          var labelNode = field.closest("div");
          if (!labelNode) {
            return false;

            return existingNode;
          }

          var warningNode = document.createElement("p");
          warningNode.setAttribute(warningAttribute, "true");
          warningNode.style.margin = "8px 0 0";
          warningNode.style.fontSize = "12px";
          warningNode.style.lineHeight = "1.45";
          warningNode.style.display = "none";
          fieldContainer.appendChild(warningNode);

          var normalizedValue = normalizeText(value);
          if (!normalizedValue) {

            normalizedValue.indexOf("/uploads/") === 0 ||
            normalizedValue.indexOf("public/uploads/") === 0

            };

              text: "Use a full http/https direct image URL, or upload the image instead.",
            };

              tone: "warning",
              text: "Use a full http/https direct image URL, or upload the image instead.",
            };
          }

          if (parsedUrl.origin === window.location.origin) {
            return {
              tone: "safe",
              text: "This local image URL should be stable.",
            };
          }

          var hostname = parsedUrl.hostname.replace(/^www\./, "").toLowerCase();
          var isRiskyHost = riskyHostPatterns.some(function (pattern) {

          if (isRiskyHost) {

              text: "This host often blocks hotlinking or expires image URLs. Upload the image or use a stable direct image source.",

            hostname.indexOf("images.") === 0 ||
            hostname.indexOf("cdn.") === 0;

              tone: "safe",
              text: "This looks like a direct image URL.",

          }, 250);
        }

        waitForRoot(0);
      })();

      (function warnOnLargeUploadedCoverImages() {

        function isImageUploadField(field) {

        function getNoticeNode(field) {

            return null;
          }

          var labelNodes = editorRoot.querySelectorAll("label");
          for (var index = 0; index < labelNodes.length; index += 1) {
            var labelNode = labelNodes[index];
            var labelText = normalizeLabel(labelNode.textContent);
            var matches = normalizedLabels.some(function (labelValue) {
              return labelText === labelValue || labelText.indexOf(labelValue) >= 0;
            });

            if (!matches) {
              continue;
            }

            if (labelNode.htmlFor) {
              var linkedField = document.getElementById(labelNode.htmlFor);
              if (isEditableField(linkedField)) {
                return linkedField;
              }
            }

            var labelContainer = labelNode.parentElement;
            if (labelContainer) {
              var nestedField = getFirstEditableField(
                labelContainer.querySelectorAll("input, textarea, select"),
              );
              if (nestedField) {
                return nestedField;
              }
            }

            var nearestBlock = labelNode.closest("div");
            if (nearestBlock) {
              var blockField = getFirstEditableField(
                nearestBlock.querySelectorAll("input, textarea, select"),
              );
              if (blockField) {
                return blockField;
              }
            }
          }

          return null;
        }

        function findField(editorRoot, name, labels) {
          var directSelectors = [
            '[name="' + name + '"]',
            '[name$=".' + name + '"]',
            '[name*="' + name + '"]',
            '[id="' + name + '"]',
            '[id$="-' + name + '"]',
            '[id*="' + name + '"]',
          ];

          for (var index = 0; index < directSelectors.length; index += 1) {
            var directField = getFirstEditableField(
              editorRoot.querySelectorAll(directSelectors[index]),
            );
            if (directField) {
              return directField;
            }
          }

          return findFieldByLabel(editorRoot, labels);
        }

        function getListFields(editorRoot, name, labels) {
          var byName = editorRoot.querySelectorAll('[name^="' + name + '."]');
          if (byName.length > 0) {
            return byName;
          }

          var byLabel = findFieldByLabel(editorRoot, labels);
          if (!byLabel) {
            return byName;
          }

          var listContainer = byLabel.closest("div");
          if (!listContainer) {
            return byName;
          }

          return listContainer.querySelectorAll('input[type="text"], input:not([type]), textarea');
        }

        function ensureListFields(editorRoot, name, labels, requiredLength) {
          var listFields = getListFields(editorRoot, name, labels);
          if (listFields.length >= requiredLength) {
            return listFields;
          }

          var searchTerms = [name, name.replace(/ies$/i, "y").replace(/s$/i, "")]
            .concat(labels || [])
            .map(function (value) {
              return normalizeLabel(value);
            })
            .filter(Boolean);

          var buttons = editorRoot.querySelectorAll("button");
          for (var index = 0; index < buttons.length; index += 1) {
            var button = buttons[index];
            var buttonText = normalizeLabel(button.textContent);

            var isAddButton = buttonText.indexOf("add ") === 0;
            var matchesField = searchTerms.some(function (term) {
              return buttonText.indexOf(term) >= 0;
            });

            if (!isAddButton || !matchesField) {
              continue;
            }

            while (listFields.length < requiredLength) {
              var previousLength = listFields.length;
              button.click();
              listFields = getListFields(editorRoot, name, labels);
              if (listFields.length <= previousLength) {
                break;
              }
            }

            if (listFields.length >= requiredLength) {
              break;
            }
          }

          return listFields;
        }

        function setSelectValue(field, rawValue) {
          var normalizedTarget = normalizeLabel(rawValue);
          var optionMatch = null;

          for (var optionIndex = 0; optionIndex < field.options.length; optionIndex += 1) {
            var option = field.options[optionIndex];
            if (
              normalizeLabel(option.value) === normalizedTarget ||
              normalizeLabel(option.textContent) === normalizedTarget
            ) {
              optionMatch = option;
              break;
            }
          }

          setNativeValue(field, optionMatch ? optionMatch.value : rawValue);
        }

        function setFieldValue(editorRoot, config) {
          var name = config.name;
          var labels = config.labels || [];
          var value = config.value;
          var isList = Boolean(config.isList);
          var isCheckbox = Boolean(config.isCheckbox);

          if (isCheckbox) {
            if (value !== true) {
              return "skipped";
            }

            var checkboxField = findField(editorRoot, name, labels);
            if (!(checkboxField instanceof HTMLInputElement) || checkboxField.type !== "checkbox") {
              return "missing";
            }

            setNativeCheckedValue(checkboxField, true);
            dispatchFieldEvents(checkboxField);
            return "updated";
          }

          if (isList) {
            var listValues = normalizeArrayValue(value);
            if (listValues.length === 0) {
              return "skipped";
            }

            var listFields = ensureListFields(
              editorRoot,
              name,
              labels,
              Math.max(listValues.length, 1),
            );

            if (listFields.length === 0) {
              return "missing";
            }

            if (listFields.length === 1) {
              var singleListField = listFields[0];
              if (isEditableField(singleListField)) {
                setNativeValue(singleListField, listValues.join(", "));
                dispatchFieldEvents(singleListField);
                return "updated";
              }
            }

            for (var listIndex = 0; listIndex < listFields.length; listIndex += 1) {
              var listField = listFields[listIndex];
              if (!isEditableField(listField)) {
                continue;
              }

              var listValue = "";
              if (listValues.length > listFields.length && listIndex === listFields.length - 1) {
                listValue = listValues.slice(listIndex).join(", ");
              } else {
                listValue =
                  typeof listValues[listIndex] === "undefined"
                    ? ""
                    : String(listValues[listIndex]);
              }
              setNativeValue(listField, listValue);
              dispatchFieldEvents(listField);
            }

            return "updated";
          }

          var normalizedValue = normalizeText(value);
          if (!normalizedValue) {
            return "skipped";
          }

          var field = findField(editorRoot, name, labels);
          if (!field) {
            return "missing";
          }

          if (field instanceof HTMLSelectElement) {
            setSelectValue(field, normalizedValue);
          } else {
            setNativeValue(field, normalizedValue);
          }

          dispatchFieldEvents(field);
          return "updated";
        }

        function createApplySummary() {
          return {
            updated: 0,
            skipped: 0,
            missing: 0,
          };
        }

        function recordApplyStatus(summary, status) {
          if (status === "updated") {
            summary.updated += 1;
            return;
          }

          if (status === "missing") {
            summary.missing += 1;
            return;
          }

          summary.skipped += 1;
        }

        async function runAutoExtract(mode) {
          var editorRoot = getEditorRoot() || document;
          var collection = getCollectionFromHash();
          sendDebugEvent("button_clicked", { mode: mode });

          if (!isSupportedCollection(collection)) {
            sendDebugEvent("unsupported_collection", { mode: mode, message: collection });
            alert("Auto extraction is available only for Jobs and Blogs entry forms.");
            return;
          }

          var sourceTextarea = getSourceTextarea();
          var sourceUrlInput = getSourceUrlInput();
          var sourceText = getManualSourceText(editorRoot, collection);
          var sourceUrl =
            sourceUrlInput instanceof HTMLInputElement
              ? String(sourceUrlInput.value || "").trim()
              : "";

          if (mode === "url" && !sourceUrl) {
            sendDebugEvent("validation_failed", {
              mode: mode,
              status: "missing_url",
            });
            setPanelStatus("Paste a public URL first.", "error");
            alert("Paste a public URL into the URL field first.");
            return;
          }

          if (mode !== "url" && !sourceText) {
            sendDebugEvent("validation_failed", {
              mode: mode,
              status: "missing_text",
            });
            setPanelStatus("Paste source text first.", "error");
            alert("Paste full source content into the Auto Extract panel textarea first.");
            return;
          }

          setActionButtonsState(true, mode);
          setPanelStatus("Requesting /api/admin/auto-extract...", "busy");
          sendDebugEvent("request_started", { mode: mode });
          var requestTimeoutId = null;

          try {
            var requestController = new AbortController();
            requestTimeoutId = window.setTimeout(function () {
              requestController.abort();
            }, 25_000);

            var response = await fetch("/api/admin/auto-extract", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              credentials: "same-origin",
              signal: requestController.signal,
              body: JSON.stringify({
                collection: collection,
                sourceText: mode === "url" ? "" : sourceText,
                sourceUrl: mode === "url" ? sourceUrl : "",
              }),
            });
            window.clearTimeout(requestTimeoutId);

            var result = await readJsonOrThrow(response);

            if (!response.ok || !result || !result.success) {
              if (result && result.error === "SessionRequired") {
                redirectToAdminLogin();
                throw new Error("Session expired. Redirecting to login...");
              }

              if (result && result.error === "EmailNotAllowed") {
                throw new Error("This Google account is not allowed for admin auto extract.");
              }

              throw new Error(
                (result && result.error) || "Auto extraction failed",
              );
            }

            if (!result.data || typeof result.data !== "object") {
              throw new Error("Invalid extraction payload");
            }

            if (sourceTextarea && typeof result.sourceText === "string" && result.sourceText.trim()) {
              sourceTextarea.value = result.sourceText.trim();
            }

            if (
              sourceUrlInput &&
              typeof result.resolvedSourceUrl === "string" &&
              result.resolvedSourceUrl.trim()
            ) {
              sourceUrlInput.value = result.resolvedSourceUrl.trim();
            }

            var fillSummary =
              collection === "jobs"
                ? applyJobData(editorRoot, result.data)
                : applyBlogData(editorRoot, result.data);

            var completionMessage =
              (mode === "url"
                ? "URL fetch + auto extraction completed ("
                : "Auto extraction completed (") +
              (result.mode || "fallback") +
              "). Updated " +
              fillSummary.updated +
              " field(s)";

            if (fillSummary.skipped > 0) {
              completionMessage += ", skipped " + fillSummary.skipped + " empty field(s)";
            }

            if (fillSummary.missing > 0) {
              completionMessage += ", " + fillSummary.missing + " field(s) were not found";
            }

            completionMessage += ".";

            if (result.mode === "fallback") {
              var fallbackReason =
                typeof result.reason === "string" ? result.reason.trim() : "";
              completionMessage += fallbackReason
                ? " Fallback reason: " + fallbackReason + "."
                : " Fallback parser was used.";
            }

            if (fillSummary.updated === 0) {
              completionMessage += " No fields were filled. Try richer structured text.";
            }

            if (mode === "url" && result.resolvedSourceUrl) {
              completionMessage += " Source: " + result.resolvedSourceUrl + ".";
            }

            completionMessage += " Please review before publishing.";
            setPanelStatus("Updated " + fillSummary.updated + " field(s).", "success");
            sendDebugEvent("request_succeeded", {
              mode: mode,
              status: "ok",
              message: String(fillSummary.updated),
            });
            alert(completionMessage);
          } catch (error) {
            var message =
              error && error.message ? error.message : "Auto extraction failed";
            if (String(message).toLowerCase().indexOf("abort") >= 0) {
              message = "Extraction timed out. Please shorten content or try again.";
            }
            setPanelStatus(message, "error");
            sendDebugEvent("request_failed", {
              mode: mode,
              status: "error",
              message: message,
            });
            if (
              String(message).indexOf("SessionRequired") >= 0 ||
              String(message).toLowerCase().indexOf("session expired") >= 0 ||
              String(message).toLowerCase().indexOf("unauthorized") >= 0
            ) {
              redirectToAdminLogin();
              return;
            }
            alert(message);
          } finally {
            if (requestTimeoutId) {
              window.clearTimeout(requestTimeoutId);
            }
            setActionButtonsState(false, mode);
          }
        }

            runAutoExtract("text");
          });

          var clearButton = document.createElement("button");
          clearButton.id = clearButtonId;
          clearButton.className = "jobadvice-auto-extract-clear-button";
          clearButton.type = "button";
          clearButton.textContent = "Clear";
          clearButton.style.padding = "9px 12px";
          clearButton.style.borderRadius = "8px";
          clearButton.style.border = "1px solid rgba(148, 163, 184, 0.85)";
          clearButton.style.background = "#ffffff";
          clearButton.style.color = "#0f172a";
          clearButton.style.fontSize = "12px";
          clearButton.style.fontWeight = "700";
          clearButton.style.cursor = "pointer";

          clearButton.addEventListener("click", function () {
            sourceUrlInput.value = "";
            sourceInput.value = "";
            sourceUrlInput.focus();
          });

          collapseToggle.addEventListener("click", function () {
            setPanelCollapsedState(!isCollapsed);
            removePanel();
            injectPanel();
          });

          var actionRow = document.createElement("div");
          actionRow.className = "jobadvice-auto-extract-actions";
          actionRow.style.display = "flex";
          actionRow.style.gap = "8px";
          actionRow.style.marginTop = "10px";

          actionRow.appendChild(urlButton);
          actionRow.appendChild(button);
          actionRow.appendChild(clearButton);

          panel.appendChild(header);
          header.appendChild(title);
          header.appendChild(collapseToggle);

          panel.appendChild(helper);
          panel.appendChild(statusLine);
          panel.appendChild(sourceUrlInput);
          panel.appendChild(sourceInput);
          panel.appendChild(actionRow);

          if (mountTarget === document.body) {
            document.body.appendChild(panel);
          } else if (typeof mountTarget.prepend === "function") {
            mountTarget.prepend(panel);
          } else {
            mountTarget.appendChild(panel);
          }
          sendDebugEvent("panel_injected", {
            status: "expanded-" + layoutMode,
          });
        }

        document.addEventListener(
          "click",
          function (event) {
            if (!isCompactViewport() || !compactPanelExpanded) {
              return;
            }

            var panel = document.getElementById(panelId);
            if (!panel || panel.hidden || panel.contains(event.target)) {
              return;
            }

            compactPanelExpanded = false;
            removePanel();
            injectPanel();
          },
          true,
        );

        window.addEventListener("hashchange", injectPanel);
        window.addEventListener("resize", injectPanel);
        window.addEventListener("load", injectPanel);
        injectPanel();
      })();
    </script>
