<svg width="640" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JobAdvice Logo Dark</title>
  <desc id="desc">JobAdvice wordmark optimized for dark backgrounds.</desc>
  <defs>
    <radialGradient id="glowGradientDark" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 110) rotate(90) scale(92 224)">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity="0.82"/>
      <stop offset="0.58" stop-color="#2DD4BF" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlurDark" x="50" y="-20" width="540" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <ellipse cx="320" cy="110" rx="230" ry="94" fill="url(#glowGradientDark)" filter="url(#softBlurDark)"/>

  <text
    x="320"
    y="132"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="118"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#CCFBF1"
    stroke="#14B8A6"
    stroke-width="1.2"
  >
    JobAdvice
  </text>
</svg>
