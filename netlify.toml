[build]
  command = "rm -rf .next out && npm run build"

# Let Netlify's Next.js runtime manage the deploy output. Forcing a raw
# publish directory here can leave HTML and hashed assets out of sync.

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 301
  force = true
