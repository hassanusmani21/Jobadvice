[build]
  command = "rm -rf .next out && npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[redirects]]
  from = "/_next/static/*"
  to = "/static/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 301
  force = true
