[build]
  command = "rm -rf .next out && npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 301
  force = true
